name: Bug report
description: Something broken on askmystack.space
labels: ["category:bug"]
body:
  - type: textarea
    id: describe
    attributes:
      label: What happened?
      description: Steps to reproduce, expected vs actual.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: Page URL
      placeholder: https://askmystack.space/...
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Browser, OS, dark/light theme
